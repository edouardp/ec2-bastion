repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-toml

  - repo: https://github.com/aws-cloudformation/cfn-lint
    rev: v1.45.0
    hooks:
      - id: cfn-lint
        files: ^cloudformation/.*\.ya?ml$

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        args: [-x, -e, SC1091]

  - repo: local
    hooks:
      - id: checkmake
        name: Lint Makefile
        entry: checkmake --config=.checkmake
        language: system
        files: ^Makefile$
